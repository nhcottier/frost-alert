name: Frost Alert
options:
  bundleIdPrefix: com.nickcottier
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
targets:
  Frost Alert:
    type: application
    platform: iOS
    sources:
      - path: Frost Alert
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nickcottier.frostalert
        CODE_SIGN_ENTITLEMENTS: Frost Alert/FrostAlert.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Frost Alert
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Frost Alert/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSLocationWhenInUseUsageDescription: Frost Alert uses your location to find local Apple Weather forecasts for frost risk.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
  Frost AlertTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Frost AlertTests
    dependencies:
      - target: Frost Alert
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nickcottier.frostalert.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Frost Alert:
    build:
      targets:
        Frost Alert: all
    test:
      targets:
        - Frost AlertTests
